services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-api_budget}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-api_budget}
      POSTGRES_DB: ${PG_DATABASE:-api_budget_app}

    ports:
      - "${PG_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-api_budget} -d ${PG_DATABASE:-api_budget_app}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    ports:
      - "${API_PORT:-5000}:3000"

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-api_budget}
      PG_PASSWORD: ${PG_PASSWORD:-api_budget}
      PG_DATABASE: ${PG_DATABASE:-api_budget_app}
      PORT: "3000"

volumes:
  postgres_data:
  api_node_modules:
